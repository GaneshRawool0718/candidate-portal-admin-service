spring:
  datasource:
    # Use 'db' as hostname instead of 'localhost' inside Docker Compose network
    url: jdbc:postgresql://db:5432/admin_db
    username: admin
    password: adminpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  application:
    name: adminService

server:
  # Listen on all network interfaces inside container
  address: 0.0.0.0

jwt:
  secret: add_your_secret_key_here
  expiration: 86400000  # 1 day in milliseconds
